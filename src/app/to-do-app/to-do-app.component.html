<div class="w-full flex flex-col items-center gap-6">
  <!-- Header -->
  <div class="flex flex-col items-center gap-5">
    <h1 class="text-3xl text-[#29134e] font-serif underline font-bold">
      TODOFY
    </h1>

    <button mat-raised-button color="primary" (click)="openFormModal()">
      Add Task
    </button>
  </div>

  <!-- Subtitle -->
  <h2 class="text-2xl text-[#29134e] text-center">
    Your personal assistant in task planning
  </h2>

  <!-- Loader -->
  <div class="flex justify-center items-center" *ngIf="apiService.loading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <!-- Task List -->
  <div
    *ngIf="!apiService.loading"
    class="w-full flex flex-col items-center justify-center gap-4"
  >
    <app-card *ngFor="let task of apiService.task_data" [task]="task"></app-card>
  </div>
</div>
