<div class="shell">
  <header class="hero">
    <h1 class="hero__title">TODOFY</h1>
    <p class="hero__subtitle">
      Plan workstreams, budgets, and priorities in one place — clear, fast, and focused.
    </p>
    <div class="hero__actions">
      <button mat-flat-button color="primary" type="button" (click)="openFormModal()">
        <mat-icon>post_add</mat-icon>
        New workstream
      </button>
    </div>
  </header>

  <section class="kpi-row" *ngIf="portfolio$ | async as portfolio">
    <div class="kpi">
      <span class="kpi__label">Portfolio total</span>
      <span class="kpi__value">{{ portfolio | sumUzs }}</span>
    </div>
  </section>

  <div class="view-switch" role="tablist" aria-label="Main views">
    <button
      type="button"
      class="view-switch__btn"
      [class.view-switch__btn--active]="activeView === 'pipeline'"
      mat-stroked-button
      (click)="selectView('pipeline')"
    >
      <mat-icon class="view-switch__ico">view_kanban</mat-icon>
      Pipeline
    </button>
    <button
      type="button"
      class="view-switch__btn"
      [class.view-switch__btn--active]="activeView === 'analytics'"
      mat-stroked-button
      (click)="selectView('analytics')"
    >
      <mat-icon class="view-switch__ico">insights</mat-icon>
      Analytics
    </button>
  </div>

  <div class="view-panel" *ngIf="activeView === 'pipeline'">
    <ng-container *ngIf="tasks$ | async as tasks">
      <div class="task-stack" [@listStagger]="tasks.length">
        <app-card *ngFor="let task of tasks" [task]="task"></app-card>
      </div>
      <p class="empty" *ngIf="tasks.length === 0">No workstreams yet — add your first one.</p>
    </ng-container>
  </div>

  <div class="view-panel view-panel--dark" *ngIf="activeView === 'analytics'">
    <app-budget-charts></app-budget-charts>
  </div>
</div>
