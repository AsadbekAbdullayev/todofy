<article class="task-card">
  <div class="task-card__main">
    <div class="task-card__chips">
      <span class="chip" [class.chip--high]="task.priority === 'high'" [class.chip--med]="task.priority === 'medium'" [class.chip--low]="task.priority === 'low'">
        {{ task.priority | titlecase }}
      </span>
      <span class="chip chip--ghost">{{ task.department }}</span>
      <span class="chip chip--ghost">{{ task.status | titlecase }}</span>
    </div>
    <h2 class="task-card__title">{{ task.title }}</h2>
    <p class="task-card__desc">{{ task.description }}</p>
    <dl class="task-metrics">
      <div>
        <dt>Rate × hours</dt>
        <dd>{{ task.billableRate | sumUzs }} × {{ task.estimatedHours }}h</dd>
      </div>
      <div>
        <dt>Expense lines</dt>
        <dd>{{ task.expenses.length }}</dd>
      </div>
      <div>
        <dt>Grand total</dt>
        <dd class="grand">{{ totals().grand | sumUzs }}</dd>
      </div>
    </dl>
  </div>
  <footer class="task-card__actions">
    <button mat-stroked-button color="primary" type="button" (click)="onEdit()">
      <mat-icon>edit</mat-icon>
      Refine
    </button>
    <button mat-icon-button color="warn" type="button" (click)="onDelete()" aria-label="Delete">
      <mat-icon>delete</mat-icon>
    </button>
  </footer>
</article>
